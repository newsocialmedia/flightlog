<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>FlightLog — Pilot Logbook</title>
    <meta name="description" content="Automated pilot logbook — upload your roster, AI reads it, tail numbers and block times sync automatically." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1A2238" />
    <meta name="background-color" content="#FAFAF8" />

    <!-- iOS PWA support (in case pilots also use iPhones) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FlightLog" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Android/Chrome icon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Prevent automatic phone-number / email detection turning text into links -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register the service worker for offline support + installability -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch((err) => {
            console.warn("Service worker registration failed:", err);
          });
        });
      }
    </script>
  </body>
</html>
